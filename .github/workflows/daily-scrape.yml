name: Daily Deep Scrape (Internshala + HackerEarth + Unstop)

on:
  schedule:
    # Runs once daily at 2 AM UTC (7:30 AM IST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run full scrape (includes Internshala, HackerEarth, Unstop)
        run: node scraper/run-all.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data.js app/seen-ids.json app/sources-health.json
          git diff --cached --quiet || git commit -m "chore: daily deep scrape [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main || (git fetch origin main && git rebase -X theirs origin/main && git push origin main)
